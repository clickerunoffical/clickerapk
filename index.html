<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CLICKER Hub | Secure Video Platform</title>
    
    <!-- Web & PWA Optimization -->
    <meta name="description" content="Professional high-security educational video platform for web and mobile.">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/512/000000/cyber-security.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        
        :root {
            --green-glow: 0 0 10px rgba(34, 197, 94, 0.3);
            --red-glow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: black;
            color: #22c55e;
            user-select: none;
            overflow-x: hidden;
            
            /* Support for Notched Devices and Web Padding */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Desktop Container for Web */
        #app {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        @media (min-width: 1024px) {
            #app {
                border-left: 1px solid rgba(34, 197, 94, 0.1);
                border-right: 1px solid rgba(34, 197, 94, 0.1);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .text-shadow-glow {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
        }

        .hacker-bg {
            background-image: radial-gradient(#112211 0.5px, transparent 0.5px);
            background-size: 10px 10px;
        }
    </style>
</head>
<body class="hacker-bg">
    <div id="app" class="relative min-h-screen max-w-md mx-auto overflow-hidden">
        <!-- App Content Injected Here -->
    </div>

    <script src="app.js"></script>
    
    <!-- Register Service Worker for PWA Offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW: Service Worker registered!', reg))
            .catch(err => console.error('SW: Service Worker registration failed!', err));
        });
      }
    </script>
</body>
</html>
